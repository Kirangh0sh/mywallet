<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MyWallet</title>
<link rel="manifest" href="manifest.json">
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js");}<\/script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg2:#181b23;--bg3:#1e222d;--bg4:#252a38;
  --text:#f0f2f8;--text2:#9499b0;--text3:#5a6080;
  --accent:#4f8ef7;--accent2:#3a6fd4;--green:#3ecf8e;--red:#f76b6b;--amber:#f7b94f;
  --purple:#a78bfa;--teal:#34d4c0;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --shadow:0 4px 24px rgba(0,0,0,0.5);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .nav{padding-bottom:calc(10px + env(safe-area-inset-bottom))!important;}
}
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center}
.ob-emoji{font-size:64px;margin-bottom:24px}
.ob-title{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:10px}
.ob-sub{font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:36px}
.ob-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px 18px;font-size:18px;color:var(--text);font-family:var(--font);outline:none;text-align:center;margin-bottom:16px}
.ob-input:focus{border-color:var(--accent)}
.ob-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font)}
.ob-btn:active{background:var(--accent2)}
.header{padding:52px 20px 12px;background:var(--bg);flex-shrink:0}
.header-top{display:flex;align-items:flex-start;justify-content:space-between}
.header-greeting{font-size:13px;color:var(--text2);margin-bottom:2px}
.header-title{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.header-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.balance-card{margin:0 20px 14px;background:linear-gradient(135deg,#1a2540,#1e2d50);border:1px solid rgba(79,142,247,0.2);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.balance-card::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(79,142,247,0.06)}
.balance-label{font-size:11px;color:rgba(144,162,220,0.6);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.balance-amount{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:-1px;color:#fff;margin-bottom:12px}
.balance-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.bal-stat{background:rgba(255,255,255,0.06);border-radius:var(--radius-xs);padding:8px 10px}
.bal-stat-label{font-size:10px;color:rgba(144,162,220,0.55);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.bal-stat-value{font-size:13px;font-weight:500}
.bal-stat-value.up{color:var(--green)}
.bal-stat-value.dn{color:var(--red)}
.bal-stat-value.neutral{color:var(--text)}
.net-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:var(--radius-xs);padding:8px 12px}
.net-bar-label{font-size:11px;color:rgba(144,162,220,0.6)}
.net-bar-value{font-size:14px;font-weight:600;font-family:var(--mono)}
.net-bar-value.pos{color:var(--green)}
.net-bar-value.neg{color:var(--red)}
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:6px 4px 10px;flex-shrink:0;z-index:10;padding-bottom:max(10px,env(safe-area-inset-bottom,10px))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:var(--radius-xs);border:none;background:none;cursor:pointer;color:var(--text3);transition:color 0.2s}
.nav-item.active{color:var(--accent)}
.nav-item-icon{font-size:18px;line-height:1}
.nav-item-label{font-size:9px;font-weight:500;letter-spacing:0.02em}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.view{display:none;padding:0 0 24px}
.view.active{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section{padding:0 20px;margin-bottom:14px}
.section-title{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.07em}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:13px;color:var(--text2);margin-bottom:12px}
.income-strip{margin:0 20px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.income-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;position:relative}
.income-tile-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.income-tile-value{font-size:15px;font-weight:500;font-family:var(--mono)}
.income-tile-value.green{color:var(--green)}
.income-tile-value.red{color:var(--red)}
.income-tile-edit{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select.form-input option{background:var(--bg3)}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.btn-primary:active{transform:scale(0.98);background:var(--accent2)}
.btn-green{background:var(--green);color:#0f1117}
.btn-green:active{background:#2db87a}
.type-toggle{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:14px}
.type-btn{flex:1;padding:9px;border:none;background:none;border-radius:var(--radius-xs);font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);font-family:var(--font);transition:all 0.15s}
.type-btn.active-expense{background:#f76b6b22;color:var(--red)}
.type-btn.active-income{background:#3ecf8e22;color:var(--green)}
.suggestion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sug-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:9px}
.sug-card:active{border-color:var(--accent);transform:scale(0.97)}
.sug-emoji{font-size:20px;flex-shrink:0}
.sug-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.2}
.sug-tap{font-size:10px;color:var(--text3);margin-top:2px}
.tx-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border:none}
.tx-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.tx-sub{font-size:11px;color:var(--text3);margin-top:1px}
.tx-right{text-align:right;flex-shrink:0;display:flex;align-items:center;gap:6px}
.tx-amt{font-size:13px;font-weight:500;font-family:var(--mono)}
.tx-amt.red{color:var(--red)}
.tx-amt.green{color:var(--green)}
.tx-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px;border-radius:5px}
.tx-del:active{color:var(--red)}
.budget-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.budget-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.budget-name{font-size:12px;color:var(--text2);width:68px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.budget-track{flex:1;background:var(--bg4);border-radius:4px;height:6px;overflow:hidden}
.budget-fill{height:100%;border-radius:4px;transition:width 0.5s}
.budget-pct{font-size:10px;color:var(--text3);width:30px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.budget-setting-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.budget-setting-row:last-child{border:none}
.bsr-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.bsr-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.bsr-input{width:100px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-xs);padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--mono);text-align:right;outline:none}
.bsr-input:focus{border-color:var(--accent)}
.insight-card{background:var(--bg3);border-radius:var(--radius-sm);padding:11px 13px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;border-left:3px solid var(--accent)}
.insight-card.warn{border-left-color:var(--amber)}
.insight-card.good{border-left-color:var(--green)}
.insight-card.info{border-left-color:var(--purple)}
.insight-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.insight-text{font-size:12px;color:var(--text);line-height:1.6}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding:0 20px 10px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:none;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all 0.15s;white-space:nowrap}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.month-nav{display:flex;align-items:center;gap:8px;padding:0 20px 12px}
.month-nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 12px;color:var(--text2);cursor:pointer;font-size:16px;font-family:var(--font)}
.month-nav-btn:active{background:var(--bg4)}
.month-nav-title{flex:1;text-align:center;font-size:14px;font-weight:500}
.top-cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.top-cat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.top-cat-info{flex:1;min-width:0}
.top-cat-name{font-size:12px;font-weight:500;color:var(--text)}
.top-cat-bar-wrap{height:4px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.top-cat-bar{height:100%;border-radius:2px}
.top-cat-right{text-align:right;flex-shrink:0}
.top-cat-amt{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text)}
.top-cat-pct{font-size:10px;color:var(--text3);margin-top:2px}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cat-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2)}
.cat-chip-del{color:var(--red);cursor:pointer;font-size:14px;line-height:1;margin-left:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;transform:translateY(100%);transition:transform 0.28s ease}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text)}
.modal-sug-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#22283a;border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;z-index:9999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.4}
.chart-container{position:relative;width:100%}
</style>
</head>
<body>

<div id="onboarding">
  <div class="ob-emoji">💸</div>
  <div class="ob-title">Welcome to MyWallet</div>
  <div class="ob-sub">Your personal money manager. Track expenses, income and budgets — all stored privately on your device.</div>
  <input class="ob-input" id="ob-name" type="text" placeholder="What's your name?" maxlength="24" autocomplete="off">
  <button class="ob-btn" onclick="finishOnboarding()">Get Started →</button>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-greeting" id="greeting">Good morning</div>
        <div class="header-title" id="header-name">MyWallet 💸</div>
      </div>
      <div class="header-avatar">💰</div>
    </div>
  </div>

  <div class="content" id="content">

    <div class="view active" id="view-dashboard">
      <div style="padding:0 20px 12px">
        <div class="balance-card">
          <div class="balance-label">Total spent this month</div>
          <div class="balance-amount" id="bal-total">₹0</div>
          <div class="balance-row">
            <div class="bal-stat"><div class="bal-stat-label">Transactions</div><div class="bal-stat-value neutral" id="bal-count">0</div></div>
            <div class="bal-stat"><div class="bal-stat-label">Daily avg</div><div class="bal-stat-value dn" id="bal-avg">₹0</div></div>
            <div class="bal-stat"><div class="bal-stat-label">Biggest spend</div><div class="bal-stat-value dn" id="bal-max" style="font-size:11px">—</div></div>
            <div class="bal-stat"><div class="bal-stat-label">Projected</div><div class="bal-stat-value neutral" id="bal-proj">₹0</div></div>
          </div>
          <div class="net-bar">
            <div class="net-bar-label">💰 Net (Income − Expense)</div>
            <div class="net-bar-value pos" id="bal-net">₹0</div>
          </div>
        </div>
      </div>

      <div class="income-strip">
        <div class="income-tile">
          <div class="income-tile-label">Income this month</div>
          <div class="income-tile-value green" id="dash-income">₹0</div>
          <button class="income-tile-edit" onclick="openIncomeModal()">✏️</button>
        </div>
        <div class="income-tile">
          <div class="income-tile-label">Savings</div>
          <div class="income-tile-value green" id="dash-savings">₹0</div>
        </div>
      </div>

      <div class="section">
        <div class="card">
          <div class="card-title">Spending by category</div>
          <div id="donut-legend" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px"></div>
          <div class="chart-container" style="height:185px"><canvas id="donutChart"></canvas></div>
        </div>
      </div>

      <div class="section">
        <div class="card">
          <div class="card-title">Last 14 days</div>
          <div class="chart-container" style="height:125px"><canvas id="lineChart"></canvas></div>
        </div>
      </div>

      <div class="section">
        <div class="card">
          <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
            Budget usage
            <button onclick="switchTab('budget',document.getElementById('nav-budget'))" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;font-family:var(--font)">Edit →</button>
          </div>
          <div id="budget-bars"></div>
        </div>
      </div>

      <div class="section">
        <div class="card">
          <div class="card-title">Recent</div>
          <div id="recent-list"></div>
        </div>
      </div>
    </div>

    <div class="view" id="view-add">
      <div style="padding:16px 20px 0;font-size:18px;font-weight:600;margin-bottom:12px">Add Transaction</div>
      <div class="section">
        <div class="type-toggle">
          <button class="type-btn active-expense" id="type-expense" onclick="setType('expense')">💸 Expense</button>
          <button class="type-btn" id="type-income" onclick="setType('income')">💰 Income</button>
        </div>
        <div id="sug-section">
          <div class="section-title">Quick add</div>
          <div class="suggestion-grid" id="sug-grid"></div>
        </div>
        <div class="card">
          <div class="card-title" id="form-card-title">Custom expense</div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Amount (₹)</label><input class="form-input" type="number" id="f-amt" placeholder="0" min="0" inputmode="numeric"></div>
            <div class="form-group" id="f-cat-group"><label class="form-label">Category</label><select class="form-input" id="f-cat"></select></div>
          </div>
          <div class="form-group"><label class="form-label">Description</label><input class="form-input" type="text" id="f-desc" placeholder="What was it for?"></div>
          <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="f-date"></div>
          <button class="btn-primary" id="add-main-btn" onclick="addTransaction()">Add Expense</button>
        </div>
      </div>
      <div class="section">
        <div class="card">
          <div class="card-title">Manage categories</div>
          <div style="display:flex;gap:8px">
            <input class="form-input" type="text" id="new-cat-name" placeholder="Category name" style="flex:1">
            <input class="form-input" type="text" id="new-cat-icon" placeholder="🏷️" maxlength="2" style="width:50px;text-align:center">
            <button onclick="addCategory()" style="padding:12px 14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:16px;cursor:pointer">+</button>
          </div>
          <div class="cat-chips" id="cat-chips"></div>
        </div>
      </div>
    </div>

    <div class="view" id="view-history">
      <div style="height:14px"></div>
      <div class="month-nav">
        <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-nav-title" id="hist-month-label"></div>
        <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="filter-scroll" id="filter-scroll"></div>
      <div class="section">
        <div class="card" style="padding:0 16px"><div id="tx-list"></div></div>
      </div>
    </div>

    <div class="view" id="view-budget">
      <div style="padding:16px 20px 0;font-size:18px;font-weight:600;margin-bottom:4px">Budget Settings</div>
      <div style="padding:0 20px 14px;font-size:13px;color:var(--text2)">Set monthly spending limits per category</div>
      <div class="section">
        <div class="card" style="padding:4px 16px"><div id="budget-settings-list"></div></div>
      </div>
      <div class="section"><button class="btn-primary" onclick="saveBudgets()">Save Budgets</button></div>
    </div>

    <div class="view" id="view-insights">
      <div style="height:14px"></div>
      <div class="section">
        <div class="card">
          <div class="card-title">6-month overview (Expenses vs Income)</div>
          <div class="chart-container" style="height:170px"><canvas id="barChart"></canvas></div>
        </div>
      </div>
      <div class="section">
        <div class="card">
          <div class="card-title">Top categories this month</div>
          <div id="top-cats"></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Smart insights</div>
        <div id="insight-list"></div>
      </div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-item active" onclick="switchTab('dashboard',this)" id="nav-dashboard"><span class="nav-item-icon">🏠</span><span class="nav-item-label">Home</span></button>
    <button class="nav-item" onclick="switchTab('add',this)" id="nav-add"><span class="nav-item-icon">➕</span><span class="nav-item-label">Add</span></button>
    <button class="nav-item" onclick="switchTab('history',this)" id="nav-history"><span class="nav-item-icon">📋</span><span class="nav-item-label">History</span></button>
    <button class="nav-item" onclick="switchTab('budget',this)" id="nav-budget"><span class="nav-item-icon">🎯</span><span class="nav-item-label">Budget</span></button>
    <button class="nav-item" onclick="switchTab('insights',this)" id="nav-insights"><span class="nav-item-icon">📊</span><span class="nav-item-label">Insights</span></button>
  </nav>
</div>

<div class="modal-overlay" id="sug-modal" onclick="closeSugModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Quick Add</div>
    <div class="modal-sug-name" id="sug-modal-name"></div>
    <div class="form-group"><label class="form-label">Amount (₹)</label><input class="form-input" type="number" id="sug-amt" placeholder="Enter amount" inputmode="numeric" style="font-size:22px;text-align:center"></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="sug-date"></div>
    <button class="btn-primary" onclick="confirmSugAdd()">Add Expense</button>
  </div>
</div>

<div class="modal-overlay" id="income-modal" onclick="closeIncomeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Income</div>
    <div id="income-entries-list" style="margin-bottom:12px"></div>
    <div class="form-group"><label class="form-label">Source (e.g. Salary, Freelance)</label><input class="form-input" type="text" id="inc-source" placeholder="Income source"></div>
    <div class="form-group"><label class="form-label">Amount (₹)</label><input class="form-input" type="number" id="inc-amt" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="inc-date"></div>
    <button class="btn-primary btn-green" onclick="addIncome()">Add Income</button>
  </div>
</div>

<div id="toast"></div>

<script>
const EXP_KEY='mw_exp_v2',CAT_KEY='mw_cat_v2',INC_KEY='mw_inc_v2',USR_KEY='mw_user_v1';
const DEFAULT_CATS=[
  {id:'food',name:'Food',icon:'🍽️',color:'#4f8ef7',budget:5000},
  {id:'transport',name:'Transport',icon:'🚗',color:'#3ecf8e',budget:2000},
  {id:'shopping',name:'Shopping',icon:'🛍️',color:'#f77c6b',budget:4000},
  {id:'health',name:'Health',icon:'💊',color:'#f06da8',budget:2000},
  {id:'bills',name:'Bills',icon:'📄',color:'#f7b94f',budget:3000},
  {id:'entertainment',name:'Fun',icon:'🎬',color:'#a78bfa',budget:2000},
  {id:'groceries',name:'Groceries',icon:'🛒',color:'#34d4c0',budget:4000},
  {id:'education',name:'Education',icon:'📚',color:'#9499b0',budget:1500},
  {id:'dining',name:'Dining',icon:'🍜',color:'#f7b94f',budget:2500},
  {id:'fitness',name:'Fitness',icon:'🏋️',color:'#3ecf8e',budget:1500},
];
const SUGGESTIONS=[
  {name:'Auto rickshaw',cat:'transport',icon:'🛺'},
  {name:'Lunch',cat:'food',icon:'🍛'},
  {name:'Coffee / Tea',cat:'food',icon:'☕'},
  {name:'Movie ticket',cat:'entertainment',icon:'🎟️'},
  {name:'Vegetables',cat:'groceries',icon:'🥦'},
  {name:'Mobile recharge',cat:'bills',icon:'📱'},
  {name:'Petrol / Fuel',cat:'transport',icon:'⛽'},
  {name:'Zomato / Swiggy',cat:'dining',icon:'📦'},
  {name:'Electricity bill',cat:'bills',icon:'💡'},
  {name:'Medicine',cat:'health',icon:'💉'},
  {name:'Bus / Metro',cat:'transport',icon:'🚌'},
  {name:'Gym',cat:'fitness',icon:'🏋️'},
  {name:'Groceries',cat:'groceries',icon:'🛒'},
  {name:'Restaurant',cat:'dining',icon:'🍜'},
  {name:'Clothes',cat:'shopping',icon:'👕'},
  {name:'Internet bill',cat:'bills',icon:'📶'},
];
let expenses=[],cats=[],incomes=[],userName='';
let activeFilter='all',viewMonth=new Date();
let donutChart,lineChart,barChart;
let currentSug=null,txType='expense';

function load(){
  try{expenses=JSON.parse(localStorage.getItem(EXP_KEY))||[];}catch(e){expenses=[];}
  try{cats=JSON.parse(localStorage.getItem(CAT_KEY))||DEFAULT_CATS;}catch(e){cats=DEFAULT_CATS;}
  try{incomes=JSON.parse(localStorage.getItem(INC_KEY))||[];}catch(e){incomes=[];}
  try{userName=localStorage.getItem(USR_KEY)||'';}catch(e){userName='';}
}
function save(){
  localStorage.setItem(EXP_KEY,JSON.stringify(expenses));
  localStorage.setItem(CAT_KEY,JSON.stringify(cats));
  localStorage.setItem(INC_KEY,JSON.stringify(incomes));
}
function fmt(n){return'₹'+Math.round(n).toLocaleString('en-IN');}
function cat(id){return cats.find(c=>c.id===id)||{name:'Other',icon:'💳',color:'#9499b0',budget:0};}
function getMonthExp(d){const m=d.getMonth(),y=d.getFullYear();return expenses.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===m&&ed.getFullYear()===y;});}
function getMonthInc(d){const m=d.getMonth(),y=d.getFullYear();return incomes.filter(e=>{const ed=new Date(e.date);return ed.getMonth()===m&&ed.getFullYear()===y;});}

function finishOnboarding(){
  const name=document.getElementById('ob-name').value.trim();
  if(!name){toast('Please enter your name');return;}
  userName=name;localStorage.setItem(USR_KEY,name);
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').style.display='flex';
  updateHeader();renderDashboard();renderAddView();
}
function updateHeader(){
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<12?'Good morning ☀️':h<17?'Good afternoon 👋':'Good evening 🌙';
  document.getElementById('header-name').textContent=userName+"'s Wallet 💸";
}
function switchTab(tab,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(el)el.classList.add('active');
  document.getElementById('content').scrollTop=0;
  if(tab==='dashboard')renderDashboard();
  if(tab==='add')renderAddView();
  if(tab==='history')renderHistory();
  if(tab==='budget')renderBudgetSettings();
  if(tab==='insights')renderInsights();
}
function renderDashboard(){
  const now=new Date(),me=getMonthExp(now),mi=getMonthInc(now);
  const total=me.reduce((a,e)=>a+e.amount,0);
  const totalInc=mi.reduce((a,e)=>a+e.amount,0);
  const days=now.getDate(),avg=days>0?total/days:0;
  const net=totalInc-total;
  const maxE=me.length?me.reduce((a,e)=>e.amount>a.amount?e:a):null;
  document.getElementById('bal-total').textContent=fmt(total);
  document.getElementById('bal-count').textContent=me.length;
  document.getElementById('bal-avg').textContent=fmt(avg);
  document.getElementById('bal-proj').textContent=fmt(Math.round(avg*30));
  document.getElementById('bal-max').textContent=maxE?maxE.desc+' ('+fmt(maxE.amount)+')':'—';
  const netEl=document.getElementById('bal-net');
  netEl.className='net-bar-value '+(net>=0?'pos':'neg');
  netEl.textContent=(net>=0?'+ ':' - ')+fmt(Math.abs(net));
  document.getElementById('dash-income').textContent=fmt(totalInc);
  const sv=document.getElementById('dash-savings');
  sv.textContent=fmt(Math.max(0,net));
  sv.className='income-tile-value '+(net>=0?'green':'red');
  updateHeader();
  renderDonut(me);renderLine();renderBudgetBars(me);renderRecent(me,mi);
}
function renderDonut(me){
  const ct={};cats.forEach(c=>ct[c.id]=0);
  me.forEach(e=>{if(ct[e.cat]!==undefined)ct[e.cat]+=e.amount;});
  const active=cats.filter(c=>ct[c.id]>0);
  const labels=active.map(c=>c.name),data=active.map(c=>ct[c.id]),colors=active.map(c=>c.color);
  const total=data.reduce((a,b)=>a+b,0);
  document.getElementById('donut-legend').innerHTML=active.map(c=>`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><span style="width:8px;height:8px;border-radius:2px;background:${c.color};flex-shrink:0"></span>${c.name} ${total>0?Math.round(ct[c.id]/total*100)+'%':''}</span>`).join('');
  if(donutChart)donutChart.destroy();
  donutChart=new Chart(document.getElementById('donutChart'),{type:'doughnut',data:{labels,datasets:[{data:data.length?data:[1],backgroundColor:data.length?colors:['#252a38'],borderWidth:0,hoverBorderWidth:2,hoverBorderColor:'#fff',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.raw)}`},backgroundColor:'#22283a',titleColor:'#f0f2f8',bodyColor:'#9499b0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}}}});
}
function renderLine(){
  const labels=[],data=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];labels.push(d.getDate()+'/'+(d.getMonth()+1));data.push(expenses.filter(e=>e.date===ds).reduce((a,e)=>a+e.amount,0));}
  if(lineChart)lineChart.destroy();
  lineChart=new Chart(document.getElementById('lineChart'),{type:'line',data:{labels,datasets:[{label:'Spending',data,borderColor:'#4f8ef7',backgroundColor:'rgba(79,142,247,0.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#4f8ef7',fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#22283a',titleColor:'#f0f2f8',bodyColor:'#9499b0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},scales:{x:{ticks:{color:'#5a6080',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'#5a6080',font:{size:10},callback:v=>'₹'+v.toLocaleString('en-IN')},grid:{color:'rgba(255,255,255,0.03)'},beginAtZero:true}}}});
}
function renderBudgetBars(me){
  const ct={};cats.forEach(c=>ct[c.id]=0);
  me.forEach(e=>{if(ct[e.cat]!==undefined)ct[e.cat]+=e.amount;});
  const rows=cats.filter(c=>c.budget>0).map(c=>{const pct=Math.min(100,Math.round(ct[c.id]/c.budget*100));const col=pct>90?'var(--red)':pct>70?'var(--amber)':c.color;return`<div class="budget-row"><div class="budget-icon">${c.icon}</div><div class="budget-name">${c.name}</div><div class="budget-track"><div class="budget-fill" style="width:${pct}%;background:${col}"></div></div><div class="budget-pct">${pct}%</div></div>`;});
  document.getElementById('budget-bars').innerHTML=rows.length?rows.join(''):'<div style="font-size:13px;color:var(--text3)">Set budgets in the Budget tab</div>';
}
function renderRecent(me,mi){
  const all=[...me.map(e=>({...e,type:'expense'})),...mi.map(e=>({...e,type:'income'}))].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  if(!all.length){document.getElementById('recent-list').innerHTML='<div class="empty"><div class="empty-icon">📭</div>No transactions yet!</div>';return;}
  document.getElementById('recent-list').innerHTML=all.map(e=>{
    const isI=e.type==='income';const c=isI?{icon:'💰',color:'#3ecf8e',name:'Income'}:cat(e.cat);const d=new Date(e.date);
    return`<div class="tx-item"><div class="tx-icon-wrap" style="background:${c.color}22">${c.icon}</div><div class="tx-body"><div class="tx-name">${isI?(e.source||'Income'):e.desc}</div><div class="tx-sub">${isI?'Income':c.name} · ${d.getDate()}/${d.getMonth()+1}</div></div><div class="tx-right"><div class="tx-amt ${isI?'green':'red'}">${isI?'+':'-'}${fmt(e.amount)}</div></div></div>`;
  }).join('');
}
function setType(t){
  txType=t;
  document.getElementById('type-expense').className='type-btn '+(t==='expense'?'active-expense':'');
  document.getElementById('type-income').className='type-btn '+(t==='income'?'active-income':'');
  document.getElementById('sug-section').style.display=t==='expense'?'block':'none';
  document.getElementById('f-cat-group').style.display=t==='expense'?'block':'none';
  document.getElementById('form-card-title').textContent=t==='expense'?'Custom expense':'Add income';
  document.getElementById('add-main-btn').textContent=t==='expense'?'Add Expense':'Add Income';
  document.getElementById('add-main-btn').className='btn-primary '+(t==='income'?'btn-green':'');
  document.getElementById('f-desc').placeholder=t==='expense'?'What was it for?':'Source (e.g. Salary)';
}
function renderAddView(){
  const sel=document.getElementById('f-cat');
  sel.innerHTML=cats.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  if(!document.getElementById('f-date').value)document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  setType(txType);
  document.getElementById('sug-grid').innerHTML=SUGGESTIONS.map(s=>`<div class="sug-card" onclick="openSugModal('${s.name}','${s.cat}','${s.icon}')"><div class="sug-emoji">${s.icon}</div><div><div class="sug-name">${s.name}</div><div class="sug-tap">Tap to add</div></div></div>`).join('');
  document.getElementById('cat-chips').innerHTML=cats.map(c=>`<div class="cat-chip">${c.icon} ${c.name}<span class="cat-chip-del" onclick="removeCat('${c.id}')">×</span></div>`).join('');
}
function addTransaction(){
  const amount=parseFloat(document.getElementById('f-amt').value);
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  const desc=document.getElementById('f-desc').value.trim();
  const date=document.getElementById('f-date').value||new Date().toISOString().split('T')[0];
  if(txType==='income'){incomes.unshift({id:Date.now(),source:desc||'Income',amount,date});save();toast('Income added ✓');}
  else{const catId=document.getElementById('f-cat').value;expenses.unshift({id:Date.now(),desc:desc||cat(catId).name,cat:catId,amount,date});save();toast('Expense added ✓');}
  document.getElementById('f-amt').value='';document.getElementById('f-desc').value='';
  renderDashboard();
}
function addCategory(){
  const name=document.getElementById('new-cat-name').value.trim();
  if(!name){toast('Enter a name');return;}
  const icon=document.getElementById('new-cat-icon').value.trim()||'💳';
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(cats.find(c=>c.id===id)){toast('Category exists');return;}
  const palette=['#4f8ef7','#3ecf8e','#f77c6b','#a78bfa','#f06da8','#f7b94f','#34d4c0'];
  cats.push({id,name,icon,color:palette[cats.length%palette.length],budget:2000});
  save();renderAddView();
  document.getElementById('new-cat-name').value='';document.getElementById('new-cat-icon').value='';
  toast('Category added!');
}
function removeCat(id){cats=cats.filter(c=>c.id!==id);save();renderAddView();}
function openSugModal(name,catId,icon){
  currentSug={name,catId,icon};
  document.getElementById('sug-modal-name').innerHTML=`<span style="font-size:20px">${icon}</span> ${name}`;
  document.getElementById('sug-amt').value='';
  document.getElementById('sug-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('sug-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sug-amt').focus(),300);
}
function closeSugModal(e){if(e.target===document.getElementById('sug-modal'))document.getElementById('sug-modal').classList.remove('open');}
function confirmSugAdd(){
  const amount=parseFloat(document.getElementById('sug-amt').value);
  if(!amount||amount<=0){toast('Enter an amount');return;}
  const date=document.getElementById('sug-date').value||new Date().toISOString().split('T')[0];
  expenses.unshift({id:Date.now(),desc:currentSug.name,cat:currentSug.catId,amount,date});
  save();document.getElementById('sug-modal').classList.remove('open');
  toast(currentSug.icon+' Added — '+fmt(amount));renderDashboard();
}
function openIncomeModal(){
  const now=new Date(),mi=getMonthInc(now);
  document.getElementById('inc-amt').value='';document.getElementById('inc-source').value='';
  document.getElementById('inc-date').value=now.toISOString().split('T')[0];
  const list=document.getElementById('income-entries-list');
  list.innerHTML=mi.length?'<div style="font-size:12px;color:var(--text3);margin-bottom:8px">This month</div>'+mi.map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${e.source}</div><div style="font-size:11px;color:var(--text3)">${new Date(e.date).toLocaleDateString('en-IN')}</div></div><div style="font-size:13px;font-weight:500;color:var(--green);font-family:var(--mono)">+${fmt(e.amount)}</div><button onclick="delIncome(${e.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px">✕</button></div>`).join(''):'';
  document.getElementById('income-modal').classList.add('open');
}
function closeIncomeModal(e){if(e.target===document.getElementById('income-modal'))document.getElementById('income-modal').classList.remove('open');}
function addIncome(){
  const amount=parseFloat(document.getElementById('inc-amt').value);
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  const source=document.getElementById('inc-source').value.trim()||'Income';
  const date=document.getElementById('inc-date').value||new Date().toISOString().split('T')[0];
  incomes.unshift({id:Date.now(),source,amount,date});save();
  toast('💰 '+source+' — '+fmt(amount)+' added');
  document.getElementById('income-modal').classList.remove('open');
  renderDashboard();
}
function delIncome(id){incomes=incomes.filter(e=>e.id!==id);save();openIncomeModal();renderDashboard();}
function renderHistory(){
  const me=getMonthExp(viewMonth),mi=getMonthInc(viewMonth);
  document.getElementById('hist-month-label').textContent=viewMonth.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  document.getElementById('filter-scroll').innerHTML=
    `<button class="filter-btn${activeFilter==='all'?' active':''}" onclick="setFilter('all',this)">All</button>`+
    `<button class="filter-btn${activeFilter==='income'?' active':''}" onclick="setFilter('income',this)">💰 Income</button>`+
    cats.map(c=>`<button class="filter-btn${activeFilter===c.id?' active':''}" onclick="setFilter('${c.id}',this)">${c.icon} ${c.name}</button>`).join('');
  let all=[];
  if(activeFilter==='all')all=[...me.map(e=>({...e,type:'expense'})),...mi.map(e=>({...e,type:'income'}))];
  else if(activeFilter==='income')all=mi.map(e=>({...e,type:'income'}));
  else all=me.filter(e=>e.cat===activeFilter).map(e=>({...e,type:'expense'}));
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!all.length){document.getElementById('tx-list').innerHTML='<div class="empty"><div class="empty-icon">🗂️</div>No transactions this month</div>';return;}
  document.getElementById('tx-list').innerHTML=all.map(e=>{
    const isI=e.type==='income';const c=isI?{icon:'💰',color:'#3ecf8e',name:'Income'}:cat(e.cat);const d=new Date(e.date);
    const delFn=isI?`delIncome(${e.id})`:`delExp(${e.id})`;
    return`<div class="tx-item"><div class="tx-icon-wrap" style="background:${c.color}22">${c.icon}</div><div class="tx-body"><div class="tx-name">${isI?(e.source||'Income'):e.desc}</div><div class="tx-sub">${isI?'Income':c.name} · ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}</div></div><div class="tx-right"><div class="tx-amt ${isI?'green':'red'}">${isI?'+':'-'}${fmt(e.amount)}</div><button class="tx-del" onclick="${delFn}">✕</button></div></div>`;
  }).join('');
}
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');renderHistory();}
function changeMonth(dir){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+dir,1);renderHistory();}
function delExp(id){expenses=expenses.filter(e=>e.id!==id);save();renderHistory();renderDashboard();}
function renderBudgetSettings(){
  document.getElementById('budget-settings-list').innerHTML=cats.map(c=>`<div class="budget-setting-row"><div class="bsr-icon">${c.icon}</div><div class="bsr-name">${c.name}</div><input class="bsr-input" type="number" id="bgt-${c.id}" value="${c.budget||0}" placeholder="0" inputmode="numeric" min="0"></div>`).join('');
}
function saveBudgets(){
  cats.forEach(c=>{const el=document.getElementById('bgt-'+c.id);if(el)c.budget=parseFloat(el.value)||0;});
  save();toast('Budgets saved ✓');renderDashboard();
}
function renderInsights(){renderBarChart();renderTopCats();renderInsightCards();}
function renderBarChart(){
  const months=[],ed=[],id=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toLocaleDateString('en-IN',{month:'short'}));ed.push(getMonthExp(d).reduce((a,e)=>a+e.amount,0));id.push(getMonthInc(d).reduce((a,e)=>a+e.amount,0));}
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:months,datasets:[{label:'Expenses',data:ed,backgroundColor:'rgba(247,107,107,0.75)',borderRadius:4,borderSkipped:false},{label:'Income',data:id,backgroundColor:'rgba(62,207,142,0.5)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9499b0',font:{size:11}}},tooltip:{backgroundColor:'#22283a',titleColor:'#f0f2f8',bodyColor:'#9499b0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},scales:{x:{ticks:{color:'#5a6080',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#5a6080',font:{size:10},callback:v=>'₹'+v.toLocaleString('en-IN')},grid:{color:'rgba(255,255,255,0.03)'},beginAtZero:true}}}});
}
function renderTopCats(){
  const me=getMonthExp(new Date()),ct={};cats.forEach(c=>ct[c.id]=0);
  me.forEach(e=>{if(ct[e.cat]!==undefined)ct[e.cat]+=e.amount;});
  const sorted=Object.entries(ct).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const total=sorted.reduce((a,[,v])=>a+v,0);
  if(!sorted.length){document.getElementById('top-cats').innerHTML='<div class="empty">No data yet</div>';return;}
  document.getElementById('top-cats').innerHTML=sorted.map(([id,amt])=>{const c=cat(id);const pct=total>0?Math.round(amt/total*100):0;return`<div class="top-cat-row"><div class="top-cat-icon" style="background:${c.color}22">${c.icon}</div><div class="top-cat-info"><div class="top-cat-name">${c.name}</div><div class="top-cat-bar-wrap"><div class="top-cat-bar" style="width:${pct}%;background:${c.color}"></div></div></div><div class="top-cat-right"><div class="top-cat-amt">${fmt(amt)}</div><div class="top-cat-pct">${pct}%</div></div></div>`;}).join('');
}
function renderInsightCards(){
  const now=new Date(),me=getMonthExp(now),mi=getMonthInc(now),le=getMonthExp(new Date(now.getFullYear(),now.getMonth()-1,1));
  const thisT=me.reduce((a,e)=>a+e.amount,0),lastT=le.reduce((a,e)=>a+e.amount,0),thisInc=mi.reduce((a,e)=>a+e.amount,0);
  const insights=[];
  if(me.length===0){insights.push({type:'info',icon:'💡',text:'Start adding expenses to unlock smart insights.'});}
  if(thisInc>0){const sr=Math.round((thisInc-thisT)/thisInc*100);if(sr>30)insights.push({type:'good',icon:'🎉',text:`Great savings rate! You're saving ${sr}% of income this month (${fmt(thisInc-thisT)}).`});else if(sr>0)insights.push({type:'info',icon:'💰',text:`Saving ${sr}% of income. Aim for 30%+ for a healthy cushion.`});else insights.push({type:'warn',icon:'⚠️',text:`Expenses exceed income by ${fmt(thisT-thisInc)}. Consider reviewing your spending.`});}
  if(lastT>0){const diff=Math.round((thisT-lastT)/lastT*100);if(diff>15)insights.push({type:'warn',icon:'📈',text:`Spending up ${diff}% vs last month. Review your biggest categories.`});else if(diff<-10)insights.push({type:'good',icon:'📉',text:`Spent ${Math.abs(diff)}% less than last month. Keep it up!`});else insights.push({type:'info',icon:'📊',text:`Spending similar to last month (${diff>0?'+':''}${diff}%).`});}
  const days=now.getDate();if(days>0&&thisT>0)insights.push({type:'info',icon:'🔮',text:`Projected spend: ${fmt(Math.round(thisT/days*30))} this month. ${days} days tracked.`});
  cats.forEach(c=>{const spent=me.filter(e=>e.cat===c.id).reduce((a,e)=>a+e.amount,0);if(c.budget&&spent>c.budget*0.85)insights.push({type:'warn',icon:'⚠️',text:`${c.icon} ${c.name}: ${Math.round(spent/c.budget*100)}% of budget used. ${fmt(Math.max(0,c.budget-spent))} left.`});});
  if(!insights.length)insights.push({type:'good',icon:'✅',text:'Everything looks balanced! Keep tracking for more insights.'});
  document.getElementById('insight-list').innerHTML=insights.map(i=>`<div class="insight-card ${i.type}"><div class="insight-icon">${i.icon}</div><div class="insight-text">${i.text}</div></div>`).join('');
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
document.getElementById('ob-name').addEventListener('keydown',e=>{if(e.key==='Enter')finishOnboarding();});
load();
if(userName){document.getElementById('onboarding').style.display='none';document.getElementById('app').style.display='flex';updateHeader();renderDashboard();renderAddView();}
<\/script>
